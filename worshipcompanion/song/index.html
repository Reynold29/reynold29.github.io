<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Companion - Opening Song</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --bg-deep: #0a0b1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b3c1;
            --accent-blue: #4a90e2;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
            --gradient-primary: linear-gradient(135deg, #4a90e2 0%, #9013fe 100%);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-secondary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 500px;
            width: 90%;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 3rem;
            color: var(--accent-blue);
            margin-bottom: 24px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--text-primary);
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .status {
            font-size: 1rem;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .btn {
            display: inline-block;
            padding: 16px 40px;
            background: var(--gradient-primary);
            color: #fff;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 4px 20px rgba(74, 144, 226, 0.4);
            transition: var(--transition);
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(74, 144, 226, 0.6);
        }

        .loader-ring {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: spin 1s ease-in-out infinite;
            margin-top: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            font-size: 0.85rem;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div class="container">
        <i class="fa-solid fa-hands-praying logo"></i>
        <h1>Worship Companion</h1>
        <p class="status">Opening your song...</p>

        <button id="mainBtn" class="btn">Open in App</button>

        <div class="loader-ring"></div>
    </div>

    <footer>
        &copy; 2026 Worship Companion
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const deepLink = window.location.href;

        function redirect() {
            // 1. Copy link to clipboard (Deferred Deep Linking)
            navigator.clipboard.writeText(deepLink).then(() => {
                // 2. Redirect to store
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                if (isIOS) {
                    window.location.href = "https://apps.apple.com/app/id6854RXDB8K";
                } else {
                    window.location.href = "https://play.google.com/store/apps/details?id=com.reyzie.worshipcompanion";
                }
            }).catch(err => {
                // Fallback if clipboard fails
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                if (isIOS) {
                    window.location.href = "https://apps.apple.com/app/id6854RXDB8K";
                } else {
                    window.location.href = "https://play.google.com/store/apps/details?id=com.reyzie.worshipcompanion";
                }
            });
        }

        document.getElementById('mainBtn').onclick = redirect;

        // Visual hint that something is happening
        setTimeout(() => {
            const status = document.querySelector('.status');
            status.textContent = "Redirecting to App Store...";
        }, 2000);
    </script>
</body>

</html>
